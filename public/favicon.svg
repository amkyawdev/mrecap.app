<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#B91C1C" stroke-width="8"/>
  
  <!-- Film clapperboard icon -->
  <g transform="translate(128, 140)">
    <!-- Main board -->
    <rect x="0" y="60" width="256" height="160" rx="12" fill="#1a1a1a"/>
    <rect x="0" y="60" width="256" height="40" rx="12" fill="#2a2a2a"/>
    
    <!-- Clapper stripes -->
    <polygon points="0,60 45,60 30,100 0,100" fill="#DC2626"/>
    <polygon points="45,60 85,60 70,100 30,100" fill="#1a1a1a"/>
    <polygon points="85,60 128,60 113,100 70,100" fill="#DC2626"/>
    <polygon points="128,60 171,60 156,100 113,100" fill="#1a1a1a"/>
    <polygon points="171,60 214,60 199,100 156,100" fill="#DC2626"/>
    <polygon points="214,60 256,60 256,100 199,100" fill="#1a1a1a"/>
    
    <!-- Film holes -->
    <rect x="20" y="120" width="30" height="30" rx="4" fill="#404040"/>
    <rect x="65" y="120" width="30" height="30" rx="4" fill="#404040"/>
    <rect x="110" y="120" width="30" height="30" rx="4" fill="#404040"/>
    <rect x="155" y="120" width="30" height="30" rx="4" fill="#404040"/>
    <rect x="200" y="120" width="30" height="30" rx="4" fill="#404040"/>
  </g>
  
  <!-- Play triangle -->
  <polygon points="210,300 210,390 290,345" fill="white"/>
  
  <!-- Sparkle effects -->
  <circle cx="380" cy="120" r="8" fill="#FCD34D"/>
  <circle cx="420" cy="180" r="5" fill="#FCD34D"/>
  <circle cx="100" cy="380" r="6" fill="#FCD34D"/>
  <circle cx="80" cy="160" r="4" fill="#FCD34D"/>
  
  <!-- Star sparkle -->
  <g transform="translate(390, 100)">
    <polygon points="0,-15 4,-4 15,0 4,4 0,15 -4,4 -15,0 -4,-4" fill="#FCD34D"/>
  </g>
  <g transform="translate(440, 340) scale(0.6)">
    <polygon points="0,-15 4,-4 15,0 4,4 0,15 -4,4 -15,0 -4,-4" fill="#FCD34D"/>
  </g>
</svg>