<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ee5a5a"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#logoGrad)" stroke-width="8" opacity="0.3"/>
  
  <!-- Film strip frame -->
  <g filter="url(#glow)">
    <!-- Top film perforations -->
    <rect x="80" y="80" width="40" height="50" rx="8" fill="url(#logoGrad)"/>
    <rect x="140" y="80" width="40" height="50" rx="8" fill="url(#logoGrad)" opacity="0.8"/>
    <rect x="332" y="80" width="40" height="50" rx="8" fill="url(#logoGrad)" opacity="0.8"/>
    <rect x="392" y="80" width="40" height="50" rx="8" fill="url(#logoGrad)"/>
    
    <!-- Bottom film perforations -->
    <rect x="80" y="382" width="40" height="50" rx="8" fill="url(#logoGrad)"/>
    <rect x="140" y="382" width="40" height="50" rx="8" fill="url(#logoGrad)" opacity="0.8"/>
    <rect x="332" y="382" width="40" height="50" rx="8" fill="url(#logoGrad)" opacity="0.8"/>
    <rect x="392" y="382" width="40" height="50" rx="8" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Main play button -->
  <g transform="translate(256, 256)">
    <!-- Play button shadow -->
    <path d="M-30 -50 L-30 50 L45 0 Z" fill="#000000" opacity="0.3" transform="translate(5, 5)"/>
    
    <!-- Play button outer glow -->
    <path d="M-35 -55 L-35 55 L55 0 Z" fill="url(#logoGrad)" filter="url(#glow)" opacity="0.5" transform="scale(1.1)"/>
    
    <!-- Play button main -->
    <path d="M-30 -50 L-30 50 L45 0 Z" fill="url(#playGrad)"/>
  </g>
  
  <!-- Subtitle bars -->
  <rect x="146" y="350" width="220" height="18" rx="9" fill="#ffffff" opacity="0.9"/>
  <rect x="166" y="378" width="180" height="14" rx="7" fill="#ffffff" opacity="0.6"/>
  
  <!-- Accent lines -->
  <line x1="80" y1="180" x2="120" y2="180" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="392" y1="180" x2="432" y2="180" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="332" x2="120" y2="332" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="392" y1="332" x2="432" y2="332" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
